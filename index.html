<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap');
:root{--bg:#faf8f5;--bg-card:#fff;--text:#2d3436;--sec:#636e72;--muted:#b2bec3;--accent:#c41e3a;--border:#e0e0e0;--shadow:0 2px 20px rgba(0,0,0,.06);--gold:#d4a843}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:'Noto Serif SC',Georgia,serif;background:var(--bg);color:var(--text);line-height:1.8}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:780px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{font-size:16px;font-weight:600;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:8px}
.nav-logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block}
.nav-links a{font-size:13px;color:var(--sec);text-decoration:none;margin-left:20px;transition:color .2s;font-family:Inter,sans-serif}
.nav-links a:hover{color:var(--accent)}
.hero{max-width:780px;margin:0 auto;padding:120px 24px 60px;text-align:center}
.hero-date{font-size:12px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-family:Inter,sans-serif;margin-bottom:16px}
.hero h1{font-size:2.4em;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:16px}
.hero-subtitle{font-size:1.1em;color:var(--sec);font-weight:300;margin-bottom:40px}
.hero-icon{font-size:48px;margin-bottom:20px;display:block}
.container{max-width:780px;margin:0 auto;padding:0 24px 80px}
.post-card{background:var(--bg-card);border-radius:16px;padding:32px;margin-bottom:24px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;text-decoration:none;color:inherit;display:block}
.post-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.1)}
.post-card:first-of-type{border-left:3px solid var(--accent)}
.post-meta{font-size:12px;color:#999;margin-bottom:8px;font-family:Inter,sans-serif}
.post-tag{display:inline-block;padding:2px 10px;background:rgba(196,30,58,0.09);color:var(--accent);border-radius:12px;font-size:11px;font-weight:500;font-family:Inter,sans-serif;margin-right:6px}
.post-card h2{font-size:1.4em;font-weight:600;margin-bottom:8px}
.post-card p{color:var(--sec);font-size:.95em}
.footer{text-align:center;padding:40px 24px;color:var(--muted);font-size:13px;font-family:Inter,sans-serif;border-top:1px solid var(--border);margin-top:60px}
@media(max-width:600px){.hero h1{font-size:1.8em}.post-card{padding:20px}}
</style>
</head>
<body>

</div>
